<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi App Web</title>
    <link rel="stylesheet" href="estilos.css">
</head>
<body>

    <!-- ENCABEZADO -->
    <header>
        <h1>Mi App Web</h1>
    </header>

    <!-- MENÚ -->
    <nav>
        <a href="#inicio">Inicio</a>
        <a href="#perfil">Perfil</a>
        <a href="#contacto">Contacto</a>
    </nav>

    <!-- CONTENIDO -->
    <main>

        <!-- BIENVENIDA -->
        <section id="inicio" class="card">
            <h2>Bienvenido</h2>
            <p>Esta es mi aplicación web tipo sistema.</p>
        </section>

        <!-- PERFIL -->
        <section id="perfil" class="card">
            <h2>Perfil</h2>
            <p>Aquí irá tu información personal.</p>
        </section>

        <!-- FORMULARIO -->
        <section id="contacto" class="card formulario">
            <h2>Formulario de Contacto</h2>

            <form>
                <input type="text" placeholder="Nombre">
                <input type="email" placeholder="Correo">
                <textarea placeholder="Mensaje"></textarea>
                <button type="submit">Enviar</button>
            </form>
        </section>

    </main>

    <!-- FOOTER -->
    <footer>
        <p>© 2026 Mi Aplicación Web</p>
    </footer>

</body>
body{
    background:linear-gradient(to bottom,#07153a,#020d24);
    color:white;
}
/* cambio final */
</html>
